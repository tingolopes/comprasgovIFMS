name: Atualizacao Diaria IFMS
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 🔄 Restaurar Cache do GitHub
        uses: actions/cache@v4
        id: cache-datalake
        with:
          path: temp/
          key: ${{ runner.os }}-data-lake-v2-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-data-lake-v2-
            ${{ runner.os }}-data-lake-

      - name: 💾 Download default cache (Seed - Apenas se o cache falhar)
        if: steps.cache-datalake.outputs.cache-hit != 'true'
        run: |
          mkdir -p temp
          curl -L -o cache.zip https://github.com/tingolopes/comprasgovIFMS/raw/refs/heads/main/cache.zip
          unzip -o cache.zip -d .
          echo "✅ Semente de arquivos históricos injetada com sucesso."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Show temp cache overview
        run: |
          echo "Temp directories:"
          ls -1 temp || true

      - name: Run full default pipeline (compras + atas)
        run: python main.py

      - name: Run contratos modules (não executados no modo padrão)
        run: |
          python main.py --modo extrator_contratos
          python main.py --modo extrator_contratos_resp

      - name: 💾 Salvar Bases Consolidadas no GitHub
        run: |
          git config --global user.name 'Michell-Bot'
          git config --global user.email 'tingolopes@gmail.com'
          git add data/*.csv
          git commit -m "Auto-update Bases: $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push

      - name: 🧹 Limpar caches antigos (mantém apenas o atual)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_KEY="${{ runner.os }}-data-lake-v2-${{ github.run_id }}"
          echo "Cache atual: $CURRENT_KEY"
          # Lista todos os caches e apaga os que não são o atual
          gh cache list --limit 100 --json key,id \
            --jq '.[] | select(.key != "'"$CURRENT_KEY"'") | .id' \
            | xargs -r -I{} gh cache delete {} && echo "✅ Caches antigos removidos." || echo "⚠️ Nenhum cache antigo para remover."

      - name: List generated CSVs
        run: |
          echo "Generated CSVs:"
          ls -1 data || true